<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Car Price Predictor</title>
  </head>
  <body>
    <h1>Car Price Predictor (Demo)</h1>
    <p>This is a tiny demo frontend that posts a JSON payload to <code>/predict</code>.</p>

    <textarea id="payload" rows="10" cols="80">{
  "YOM": 2016,
  "Engine (cc)": 1500,
  "Millage(KM)": 65000,
  "Car_Age": 9
}</textarea>
    <br/>
    <button id="send">Send</button>
    <pre id="out"></pre>

    <script>
      document.getElementById('send').onclick = async () => {
        const payload = JSON.parse(document.getElementById('payload').value);
        const res = await fetch('/predict', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        document.getElementById('out').innerText = JSON.stringify(json, null, 2);
      };
    </script>
  </body>
</html>
